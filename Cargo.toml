[package]
name         = "persona"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.88"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/persona"
description  = "Engine manager and apex integration repo for multi-harness AI systems."

[lib]
name = "persona"
path = "src/lib.rs"

[[bin]]
name = "persona"
path = "src/main.rs"

[[bin]]
name = "persona-daemon"
path = "src/bin/persona_daemon.rs"

[dependencies]
kameo                  = { version = "0.20", default-features = false }
nota-codec             = { git = "https://github.com/LiGoldragon/nota-codec.git", branch = "main" }
rkyv                   = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
sema                   = { git = "https://github.com/LiGoldragon/sema.git" }
signal-core            = { git = "https://github.com/LiGoldragon/signal-core.git" }
signal-persona         = { git = "https://github.com/LiGoldragon/signal-persona.git" }
signal-persona-auth    = { git = "https://github.com/LiGoldragon/signal-persona-auth.git" }
signal-persona-message = { git = "https://github.com/LiGoldragon/signal-persona-message.git" }
thiserror              = "2"
tokio                  = { version = "1", features = ["rt-multi-thread", "macros", "io-util", "net"] }

# ─── Wire-test shim binaries (for nix-chained tests) ──────
# These exercise signal-persona-message end-to-end through
# real bytes on stdout/stdin.

[[bin]]
name = "wire-emit-message"
path = "src/bin/wire_emit_message.rs"

[[bin]]
name = "wire-decode-message"
path = "src/bin/wire_decode_message.rs"

[lints.rust]
unused = "warn"
dead_code = "warn"
