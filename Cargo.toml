[package]
name         = "persona"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/persona"
description  = "Typed coordination framework for multi-harness AI systems."

[lib]
name = "persona"
path = "src/lib.rs"

[[bin]]
name = "persona"
path = "src/main.rs"

[dependencies]
nota-codec             = { git = "https://github.com/LiGoldragon/nota-codec.git", branch = "main" }
ractor                 = { version = "0.15", features = ["async-trait"] }
redb                   = "2"
rkyv                   = { version = "0.8", default-features = false, features = [
    "std",
    "bytecheck",
    "little_endian",
    "pointer_width_32",
    "unaligned",
] }
signal-core            = { git = "https://github.com/LiGoldragon/signal-core.git" }
signal-persona-message = { git = "https://github.com/LiGoldragon/signal-persona-message.git" }
signal-persona-store   = { git = "https://github.com/LiGoldragon/signal-persona-store.git" }
thiserror              = "2"
tokio                  = { version = "1", features = ["rt-multi-thread", "macros", "io-util", "net"] }

# ─── Wire-test shim binaries (for nix-chained tests) ──────
# These exercise the signal-persona-message ↔ signal-persona-store
# channel pair end-to-end through real bytes on stdout/stdin.

[[bin]]
name = "wire-emit-message"
path = "src/bin/wire_emit_message.rs"

[[bin]]
name = "wire-decode-message"
path = "src/bin/wire_decode_message.rs"

[[bin]]
name = "wire-relay-message-to-store"
path = "src/bin/wire_relay_message_to_store.rs"

[[bin]]
name = "wire-decode-store"
path = "src/bin/wire_decode_store.rs"

[dev-dependencies]
tempfile = "3"

[lints.rust]
unused = "warn"
dead_code = "warn"
